# Local full-stack dev environment: frontend + backend + postgres + redis.
# Run with: docker compose up --build
#
# Secrets come from the existing backend/.env and frontend/.env files. The
# frontend build also needs NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY at build time —
# set it in a root .env (see .env.example). DATABASE_URL / REDIS_URL are
# overridden here to point at the compose service hostnames.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postpilot
      POSTGRES_PASSWORD: postpilot
      POSTGRES_DB: postpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: "5000"
      # Point at the compose services (overrides values from backend/.env).
      DATABASE_URL: postgresql://postpilot:postpilot@postgres:5432/postpilot
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?Set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY in a root .env}
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
        BACKEND_INTERNAL_URL: http://backend:5000
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: production
      # The frontend reverse-proxies /api/* to the backend service.
      BACKEND_INTERNAL_URL: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
